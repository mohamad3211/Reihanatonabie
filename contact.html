<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تماس با ما - هیئت ریحانة النبی (س)</title>
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@100;400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #0a0a0a; --bg-card: #161616; --text-main: #e0e0e0; --text-muted: #a0a0a0;
      --accent-green: #2e7d32; --accent-red: #c62828; --border-color: #252525;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Vazirmatn', sans-serif; background-color: var(--bg-dark); color: var(--text-main); line-height: 1.8; overflow-x: hidden; }
    .container { width: 90%; max-width: 1100px; margin: 0 auto; }
    
    /* Header & Nav */
    header { background: rgba(10, 10, 10, 0.9); border-bottom: 1px solid var(--border-color); padding: 15px 0; position: sticky; top: 0; z-index: 1000; }
    .header-flex { display: flex; justify-content: space-between; align-items: center; }
    .logo { font-size: 1.2rem; font-weight: 700; color: #fff; }
    .logo span { color: var(--accent-red); }
    nav ul { display: flex; list-style: none; gap: 15px; }
    nav a { text-decoration: none; color: var(--text-muted); font-size: 0.85rem; transition: 0.3s; }
    nav a:hover, nav a.active { color: var(--accent-green); }

    /* Content Section */
    .content-section { padding: 40px 0; }
    .contact-grid { display: flex; flex-direction: column; gap: 20px; }
    .contact-item { background: var(--bg-card); padding: 25px; border-radius: 15px; border-right: 4px solid var(--accent-red); transition: 0.3s; }
    .contact-item:hover { transform: translateY(-5px); background: #1e1e1e; }
    .contact-item h4 { color: var(--accent-green); margin-bottom: 10px; font-size: 1.1rem; }
    .contact-item p { font-size: 0.95rem; color: var(--text-main); direction: ltr; } /* شماره‌ها و آدرس برای نمایش بهتر */
    .contact-item p.rtl-text { direction: rtl; }

    footer { text-align: center; padding: 30px 0; border-top: 1px solid var(--border-color); color: var(--text-muted); font-size: 0.8rem; }

    /* Responsive */
    @media (min-width: 768px) {
      .contact-grid { flex-direction: row; }
      .contact-item { flex: 1; }
      nav a { font-size: 0.95rem; }
    }
  </style>
</head>
<body>
  <header>
    <div class="container header-flex">
      <div class="logo">هیئت <span style="color: var(--accent-red);">ریحانة النبی</span> (س)</div>
      <nav>
        <ul style="margin:0; padding:0;">
          <li><a href="index.html">خانه</a></li>
          <li><a href="about.html">درباره ما</a></li>
          <li><a href="donate.html">نذورات</a></li>
          <li><a href="contact.html" class="active">تماس</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="container content-section">
    <h2 style="text-align: center; margin-bottom: 30px; color: var(--accent-red);">راه‌های ارتباطی</h2>
    
    <div class="contact-grid">
      <!-- آدرس -->
      <div class="contact-item">
        <h4>آدرس هیئت</h4>
        <p class="rtl-text">تهران، [نام محله/خیابان]، [پلاک/نام ساختمان]</p>
      </div>

      <!-- ایتا / شبکه‌های اجتماعی -->
      <div class="contact-item">
        <h4>ایتا و شبکه‌های اجتماعی</h4>
        <p>@reyhane_alnabi</p>
      </div>

      <!-- تلفن -->
      <div class="contact-item">
        <h4>شماره تماس</h4>
        <p>021 1234 5678</p>
      </div>

      <!-- ایمیل -->
      <div class="contact-item">
        <h4>پست الکترونیک</h4>
        <p>info@reyhanealnabi.ir</p>
      </div>
    </div>
  </main>

  <footer>
    <div class="container">
      <p>© ۱۴۰۳ تمامی حقوق برای هیئت ریحانة النبی محفوظ است.</p>
    </div>
  </footer>
</body>
</html>

<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تماس با ما - هیئت ریحانة النبی (س)</title>
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@100;400;700&display=swap" rel="stylesheet">
 <style>
  :root {
    --bg-dark: #0a0a0a; 
    --bg-card: #161616; 
    --text-main: #e0e0e0; 
    --text-muted: #a0a0a0;
    --accent-green: #2e7d32; 
    --accent-red: #c62828; 
    --border-color: #252525;
  }

  * { 
    margin: 0; 
    padding: 0; 
    box-sizing: border-box; 
  }

  body { 
    font-family: 'Vazirmatn', sans-serif; 
    background-color: var(--bg-dark); 
    color: var(--text-main); 
    line-height: 1.8;
    /* جلوگیری از اسکرول افقی در موبایل */
    overflow-x: hidden; 
    width: 100%;
  }

  /* این بخش جادوی اصلی است: تنظیم عرض کل صفحه */
  .container { 
    width: 95%; 
    max-width: 1100px; 
    margin: 0 auto; 
  }

  header { 
    background: rgba(10, 10, 10, 0.9); 
    border-bottom: 1px solid var(--border-color); 
    padding: 15px 0; 
    position: sticky; 
    top: 0; 
    z-index: 1000; 
  }

  .header-flex { 
    display: flex; 
    justify-content: space-between; 
    align-items: center; 
  }

  .logo { font-size: 1.2rem; font-weight: 700; color: #fff; }
  .logo span { color: var(--accent-red); }

  nav ul { 
    display: flex; 
    list-style: none; 
    gap: 15px; 
  }

  nav a { 
    text-decoration: none; 
    color: var(--text-muted); 
    font-size: 0.85rem; 
    transition: 0.3s; 
  }

  nav a:hover, nav a.active { color: var(--accent-green); }

  .content-section { padding: 40px 0; }

  /* اصلاح کارت‌ها برای موبایل */
  .contact-card, .about-card, .donate-card {
    background: var(--bg-card);
    padding: 25px;
    border-radius: 20px;
    border-right: 5px solid var(--accent-green);
    /* جلوگیری از زیر هم رفتن اجباری در موبایل */
    display: flex;
    flex-direction: column; 
    gap: 20px;
  }

  /* اگر در دسکتاپ می‌خواهید کنار هم باشند، از این استفاده کنید */
  @media (min-width: 768px) {
    .contact-card, .about-card, .donate-card {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      padding: 40px;
    }
    .logo { font-size: 1.4rem; }
    nav a { font-size: 0.95rem; }
  }

  footer { 
    text-align: center; 
    padding: 30px 0; 
    border-top: 1px solid var(--border-color); 
    color: var(--text-muted); 
    font-size: 0.8rem; 
  }

  /* جلوگیری از کوچک شدن بیش از حد المان‌ها در گوشی‌های خیلی کوچک */
  @media (max-width: 360px) {
    .logo { font-size: 1rem; }
    nav ul { gap: 8px; }
    nav a { font-size: 0.75rem; }
  }
</style>

</head>
<body>
  <header>
    <div class="container header-flex">
      <div class="logo">هیئت ریحانة النبی (س)</div>
      <nav>
        <ul>
          <li><a href="index.html">صفحه اصلی</a></li>
          <li><a href="about.html">درباره ما</a></li>
          <li><a href="donate.html">نذورات</a></li>
          <li><a href="contact.html" class="active">تماس</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="content-section">
    <div class="container">
      <h1 style="text-align: center; margin-bottom: 40px; color: #fff;">راه‌های ارتباطی</h1>
      <div class="contact-card">
        <div class="contact-item">
            
          <h2>📍 آدرس</h2>
          <p>مسجد علی بن موسی الرضا،دفتر هیئت پایگاه بسیج</p>
        </div>

        <div class="contact-item">
          <h2>📱 ایتا</h2>
          <p>Reihanatonabie@</p>
        </div>

        <div class="contact-item">
          <h2>📞 تلفن</h2>
          <p>09220519036</p>
        </div>
        
        <div class="contact-item">
          <h2>📧 ایمیل</h2>
          <p>reihanat@gmail.com</p>
        </div>

      </div>
    </div>
  </main>

  <footer>
    <div class="container">
      <p>@Reihanatonabie_ir | ©  تمامی حقوق محفوظ است.</p>
    </div>
  </footer>
</body>
</html>

<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تماس با ما - هیئت ریحانة النبی (س)</title>
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@100;400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #0a0a0a; --bg-card: #161616; --text-main: #e0e0e0; --text-muted: #a0a0a0;
      --accent-green: #2e7d32; --accent-red: #c62828; --accent-gold: #d4af37; --border-color: #252525;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Vazirmatn', sans-serif; background-color: var(--bg-dark); color: var(--text-main); line-height: 1.8; }
    .container { width: min(1100px, 90%); margin: 0 auto; }
    header { background: rgba(10, 10, 10, 0.9); border-bottom: 1px solid var(--border-color); padding: 15px 0; position: sticky; top: 0; z-index: 1000; }
    .header-flex { display: flex; justify-content: space-between; align-items: center; }
    .logo { font-size: 1.4rem; font-weight: 700; color: #fff; }
    .logo span { color: var(--accent-red); }
    nav ul { display: flex; list-style: none; gap: 20px; }
    nav a { text-decoration: none; color: var(--text-muted); font-size: 0.95rem; transition: 0.3s; }
    nav a:hover, nav a.active { color: var(--accent-green); }

    .content-section { padding: 60px 0; }
    .contact-card {
      background: var(--bg-card);
      padding: 40px;
      border-radius: 30px;
      border-right: 5px solid var(--accent-green);
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 30px;
    }
    .contact-item h3 { color: var(--accent-red); margin-bottom: 15px; font-size: 1.3rem; }
    .contact-item p { color: var(--text-main); font-size: 1.1rem; }

    footer { text-align: center; padding: 40px 0; border-top: 1px solid var(--border-color); color: var(--text-muted); font-size: 0.85rem; }
    
    @media (max-width: 768px) {
      .header-flex { flex-direction: column; gap: 15px; }
      .contact-card { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

      <nav>

          <li><a href="contact.html" class="active">تماس</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="content-section">

  </main>

  <footer>

  </footer>
</body>
